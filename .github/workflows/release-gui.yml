name: release-gui

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach GUI assets to, for example v0.2.0"
        required: true

permissions:
  contents: write

jobs:
  wails:
    name: Build GUI (${{ matrix.asset_suffix }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            asset_suffix: linux_amd64
            asset_extension: .tar.gz
          - os: macos-14
            asset_suffix: darwin_arm64
            asset_extension: .zip
          - os: windows-latest
            asset_suffix: windows_amd64
            asset_extension: .zip

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            tag="${{ github.event.release.tag_name }}"
          else
            tag="${{ inputs.tag }}"
          fi
          safe_tag="${tag//\//-}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "asset_name=HumbleBee_GUI_${safe_tag}_${{ matrix.asset_suffix }}${{ matrix.asset_extension }}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Build GUI
        run: go run github.com/wailsapp/wails/v2/cmd/wails@v2.12.0 build -clean -tags production

      - name: Package Linux GUI
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p release
          tar -C build/bin -czf "release/${{ steps.release.outputs.asset_name }}" HumbleBee

      - name: Package macOS GUI
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p release
          ditto -c -k --sequesterRsrc --keepParent build/bin/HumbleBee.app "release/${{ steps.release.outputs.asset_name }}"

      - name: Package Windows GUI
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Compress-Archive -Path build/bin/HumbleBee.exe -DestinationPath "release/${{ steps.release.outputs.asset_name }}"

      - name: Upload GUI asset
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          files: release/${{ steps.release.outputs.asset_name }}
