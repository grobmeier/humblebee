name: release-gui

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach GUI assets to, for example v0.2.0"
        required: true

permissions:
  contents: write

jobs:
  wails:
    name: Build GUI (${{ matrix.asset_suffix }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            asset_suffix: linux-amd64
            asset_name: HumbleBee_linux_amd64.tar.gz
          - os: macos-13
            asset_suffix: darwin-amd64
            asset_name: HumbleBee_darwin_amd64.zip
          - os: macos-14
            asset_suffix: darwin-arm64
            asset_name: HumbleBee_darwin_arm64.zip
          - os: windows-latest
            asset_suffix: windows-amd64
            asset_name: HumbleBee_windows_amd64.zip

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Build GUI
        run: go run github.com/wailsapp/wails/v2/cmd/wails@v2.12.0 build -clean

      - name: Package Linux GUI
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p release
          tar -C build/bin -czf "release/${{ matrix.asset_name }}" HumbleBee

      - name: Package macOS GUI
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p release
          ditto -c -k --sequesterRsrc --keepParent build/bin/HumbleBee.app "release/${{ matrix.asset_name }}"

      - name: Package Windows GUI
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Compress-Archive -Path build/bin/HumbleBee.exe -DestinationPath "release/${{ matrix.asset_name }}"

      - name: Upload GUI asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          files: release/${{ matrix.asset_name }}
