name: sbom

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach the SBOM to, for example v0.2.1"
        required: false
  push:
    branches:
      - main
  pull_request:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  generate:
    if: github.event_name != 'release' && inputs.tag == ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: humblebee-sbom.cdx.json
          artifact-name: humblebee-sbom.cdx.json
          upload-artifact: true
          upload-release-assets: false

  release:
    if: github.event_name == 'release' || inputs.tag != ''
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Resolve SBOM filename
        id: sbom
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            tag="${{ github.event.release.tag_name }}"
          else
            tag="${{ inputs.tag }}"
          fi
          safe_tag="${tag//\//-}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "file=HumbleBee_${safe_tag}_sbom.cdx.json" >> "$GITHUB_OUTPUT"

      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.sbom.outputs.tag }}

      - name: Generate and attach CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: ${{ steps.sbom.outputs.file }}
          artifact-name: ${{ steps.sbom.outputs.file }}
          upload-artifact: true
          upload-release-assets: true
