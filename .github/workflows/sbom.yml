name: sbom

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  generate:
    if: github.event_name != 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: humblebee-sbom.cdx.json
          artifact-name: humblebee-sbom.cdx.json
          upload-artifact: true
          upload-release-assets: false

  release:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve SBOM filename
        id: sbom
        shell: bash
        run: |
          tag="${{ github.event.release.tag_name }}"
          safe_tag="${tag//\//-}"
          echo "file=HumbleBee_${safe_tag}_sbom.cdx.json" >> "$GITHUB_OUTPUT"

      - name: Generate and attach CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: ${{ steps.sbom.outputs.file }}
          artifact-name: ${{ steps.sbom.outputs.file }}
          upload-artifact: true
          upload-release-assets: true
